<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RTL Editor</title>
  <link rel="stylesheet" href="rtl-editor.css">
</head>
<body>
  <title>RTL Power-Up</title>
  <div id="container">
    <div id="editor">
      <div id="toolbar">
        <div id="heading-picker">
          <button id="heading-toggle" aria-haspopup="true" aria-expanded="false">Aa <span class="caret">▾</span></button>
          <div id="heading-menu" role="menu" hidden>
            <button data-block="p"    role="menuitem">Normal text<span class="shortcut">Ctrl+Alt+0</span></button>
            <button data-block="h1"   role="menuitem">Heading 1<span class="shortcut">Ctrl+Alt+1</span></button>
            <button data-block="h2"   role="menuitem">Heading 2<span class="shortcut">Ctrl+Alt+2</span></button>
            <button data-block="h3"   role="menuitem">Heading 3<span class="shortcut">Ctrl+Alt+3</span></button>
            <button data-block="h4"   role="menuitem">Heading 4<span class="shortcut">Ctrl+Alt+4</span></button>
            <button data-block="h5"   role="menuitem">Heading 5<span class="shortcut">Ctrl+Alt+5</span></button>
            <button data-block="h6"   role="menuitem">Heading 6<span class="shortcut">Ctrl+Alt+6</span></button>
          </div>
        </div>
        <div class="toolbar-sep"></div>
        <button data-cmd="bold"><b>B</b></button>
        <button data-cmd="italic"><em>I</em></button>
        <button data-cmd="insertUnorderedList">•</button>
        <button data-cmd="emoji">🙂</button>
      </div>
      
      <div id="text-input" contenteditable="true" dir="rtl"></div>

    </div>
    <div id="editor-controls">
      <button id="saveBtn">Save</button>
      <span id="statusIcon">❌</span>
    </div>

    <button id="editBtn">Edit</button>
  </div>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="rtl-editor.js"></script>
</body>
</html>
